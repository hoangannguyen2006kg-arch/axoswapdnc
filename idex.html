<!doctype html>
<html lang="vi">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AxoSwap DNC | Nền tảng trao đổi vật phẩm</title>
    <link rel="stylesheet" href="styles.css" />
    <link

    />
  </head>
  <body>
    <header class="navbar">
      <!-- Avatar -->
      <div class="user-account">
        <div class="avatar">
          <i class="fa-solid fa-user"></i>

      <form>
        <input type="text" placeholder="Tìm kiếm..." size="40" />

          <i class="fa-solid fa-magnifying-glass"></i>

      </form>

      <!-- Menu -->
      <nav class="nav-menu">
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">Category</a></li>
          <li><a href="#">Market</a></li>
          <li><a href="#">Trade</a></li>
          <li><a href="#" class="highlight">Take away for free</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>

      <!-- Logo -->
      <div class="logo">
        <img src="./ảnh/logo_final.png" alt="logo" width="75" height="100" />
      </div>
    </header>

    <!-- Nội dung -->
    <main class="content">
      <h2>Chào mừng bạn đến với cộng đồng trao đổi!</h2>
      <p>
        Tìm kiếm sách, đồ dùng học tập và nhiều thứ khác hoàn toàn miễn phí hoặc
        trao đổi dễ dàng.
      </p>

      <button class="btn-main">Khám phá ngay</button>
    </main>
  </body>
