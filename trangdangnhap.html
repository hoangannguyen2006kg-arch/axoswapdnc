<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AxoSwap DNC | Nền tảng trao đổi vật phẩm</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <section class="contact-container">
      <form class="login-form" action="#" method="post">
        <div class="logo">
          <a href="idex.html" target="_self"
            ><img src="./ảnh/logo_final.png" alt="logo"
          /></a>
        </div>
        <h2>Đăng nhập vào AxoSwap</h2>
        <label>Mã số sinh viên:</label>
        <input
          type="text"
          name="student_id"
          placeholder="Mã số sinh viên"
          required
        />
        <label>Mật khẩu:</label>
        <input
          type="password"
          name="password"
          placeholder="Mật khẩu"
          required
        />
        <span class="forgot-password"><a href="#">Quên mật khẩu ?</a></span>
        <span class="login-button"
          ><button type="submit">Đăng nhập</button></span
        >
        <p>Chưa có tài khoản? <a href="trangdangki.html">Đăng ký ngay</a></p>
      </form>
    </section>
  </body>
</html>
