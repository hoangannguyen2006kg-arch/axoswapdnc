<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AxoSwap DNC | Nền tảng trao đổi vật phẩm</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <section class="contact-container">
      <form class="register-form" action="#" method="post">
        <div class="logo">
          <a href="idex.html" target="_self"
            ><img src="./ảnh/logo_final.png" alt="logo"
          /></a>
        </div>
        <h2>Đăng kí vào AxoSwap</h2>
          <input type="text" name="full_name" placeholder="Họ tên" required />
          <input
            type="text"
            name="student_id"
            placeholder="Mã số sinh viên"
            required
          />
          <input type="text" name="class" placeholder="Lớp" required />
          <input type="email" name="email" placeholder="Email" required />
        </div>
          <input
            type="text"
            name="phone_number"
            placeholder="Số điện thoại"
            required
          />
          <input
            type="password"
            name="password"
            placeholder="Mật khẩu"
            required
          />
          <input
            type="password"
            name="confirm_password"
            placeholder="Nhập lại mật khẩu"
            required
          />
        <span class="login-button"><button type="submit">Đăng kí</button></span>
        <p>Đã có tài khoản? <a href="trangdangnhap.html">Đăng nhập ngay</a></p>
      </form>
    </section>
  </body>
</html>
